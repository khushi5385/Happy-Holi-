<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Surprise for Moto 💞🧿</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd9e8 0%, #ffecf5 100%);
            font-family: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            background-image: radial-gradient(circle at 10% 30%, rgba(255, 170, 200, 0.15) 6px, transparent 6px),
                              radial-gradient(circle at 90% 70%, rgba(210, 140, 255, 0.1) 8px, transparent 8px);
            background-size: 70px 70px;
        }

        /* main card – soft, elegant, mobile-first */
        .page {
            max-width: 380px;
            width: 100%;
            background: rgba(255, 248, 250, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            box-shadow: 0 25px 40px -10px rgba(220, 100, 140, 0.3),
                        0 0 0 2px rgba(255, 255, 255, 0.9) inset,
                        0 4px 12px rgba(255, 200, 220, 0.6);
            padding: 32px 18px 38px;
            text-align: center;
            border: 2px solid #ffb6d1;
            transition: opacity 0.3s ease;
        }

        /* hidden state – guaranteed to hide */
        .hidden-page {
            display: none !important;
        }

        /* surprise page contents */
        .surprise-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .big-heart-surprise {
            font-size: 5.2rem;
            line-height: 1;
            filter: drop-shadow(0 12px 12px #ffa7c4);
            animation: softBeat 1.8s infinite ease-in-out;
            margin-bottom: 6px;
        }

        @keyframes softBeat {
            0% { transform: scale(1); }
            10% { transform: scale(1.12); }
            20% { transform: scale(1.05); }
            30% { transform: scale(1.1); }
            40% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .surprise-message {
            font-size: 2.2rem;
            font-weight: 550;
            color: #a13560;
            background: #fff0f7;
            padding: 18px 22px;
            border-radius: 60px;
            border: 3px solid white;
            box-shadow: 0 6px 0 #ffb7cf;
            line-height: 1.4;
            width: 100%;
        }

        .surprise-message span {
            font-size: 2.6rem;
            margin: 0 3px;
        }

        /* clear, tappable buttons */
        .btn-reveal, .romance-btn {
            background: #ffbcd5;
            border: 3px solid white;
            font-size: 1.9rem;
            font-weight: 600;
            padding: 14px 26px;
            border-radius: 70px;
            color: #902e57;
            box-shadow: 0 6px 0 #c67b9b;
            cursor: pointer;
            transition: 0.06s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 8px 0 12px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            min-width: 240px;
            letter-spacing: 0.5px;
        }

        .btn-reveal:active, .romance-btn:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #c67b9b;
        }

        .small-note {
            font-size: 1.5rem;
            color: #b5426c;
            background: #ffecf2;
            padding: 8px 28px;
            border-radius: 50px;
            border: 2.5px solid white;
            margin-top: 12px;
            box-shadow: 0 3px 0 #ffbace;
        }

        /* main romantic page */
        .romance-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            margin-bottom: 12px;
        }

        .heartbeat {
            font-size: 3.8rem;
            filter: drop-shadow(0 5px 6px #ff9ebd);
            animation: gentlePulse 1.6s infinite;
        }

        .nazar-gentle {
            font-size: 3.8rem;
            filter: drop-shadow(0 5px 6px #b1aeff);
            animation: softFloat 3s infinite alternate;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); }
            10% { transform: scale(1.12); }
            25% { transform: scale(1.04); }
            40% { transform: scale(1.1); }
            60% { transform: scale(1); }
        }

        @keyframes softFloat {
            0% { transform: translateY(0) rotate(3deg); }
            100% { transform: translateY(-10px) rotate(6deg); }
        }

        .moto-romantic {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #a53860;
            background: linear-gradient(145deg, #ffe6f0, #ffdaea);
            display: inline-block;
            padding: 0.2rem 2rem;
            border-radius: 120px;
            margin: 8px 0 16px;
            border: 3px solid white;
            box-shadow: 0 6px 0 #ff9ebe;
            text-shadow: 2px 2px 0 #fff5fa;
        }

        .love-message {
            font-size: 1.9rem;
            font-weight: 550;
            color: #802f53;
            background: #fff0f7;
            padding: 20px 16px;
            border-radius: 40px 40px 40px 20px;
            margin: 12px 0 16px;
            border: 3px dashed #ffa5c3;
            line-height: 1.5;
            box-shadow: 0 5px 0 #ffbed2;
        }

        .love-message span {
            font-size: 2.2rem;
            margin: 0 2px;
        }

        .romantic-verse {
            font-size: 1.6rem;
            color: #9f3d62;
            background: #ffeaf2;
            padding: 14px 12px;
            border-radius: 70px;
            margin: 10px 0 16px;
            border: 2px solid white;
            font-weight: 500;
            box-shadow: 0 4px 0 #ffc1d4;
        }

        .heart-drops {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 18px 20px;
            margin: 20px 0 20px;
        }

        .heart-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .heart-blob {
            width: 70px;
            height: 70px;
            background: #fbb0c4;
            border-radius: 50% 30% 60% 40% / 40% 50% 50% 60%;
            box-shadow: 0 8px 0 #da96b0, 0 0 0 4px white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            transition: 0.2s;
        }

        .heart-blob:active {
            transform: scale(0.96);
        }

        .heart-item span {
            background: #ffdeec;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 4px 18px;
            border-radius: 40px;
            color: #982f5a;
            border: 2px solid white;
        }

        .footer-love {
            font-size: 1.7rem;
            color: #ac3f68;
            background: #ffe2ef;
            padding: 10px 22px;
            border-radius: 70px;
            display: inline-block;
            border: 3px solid white;
            margin-top: 16px;
            font-weight: 500;
            box-shadow: 0 4px 0 #ffb8cf;
        }

        /* floating hearts container (does not block buttons) */
        .floating-hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            color: #ff9ebe;
            font-size: 2.2rem;
            opacity: 0.7;
            filter: drop-shadow(0 4px 6px #ffb0c7);
            animation: floatUp 4s linear forwards;
            bottom: -10vh;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0.8; }
            100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
        }

        /* extra responsiveness */
        @media (max-width: 360px) {
            .page { padding: 28px 12px 32px; }
            .moto-romantic { font-size: 3.8rem; }
            .love-message { font-size: 1.7rem; }
            .btn-reveal, .romance-btn { font-size: 1.7rem; padding: 12px 18px; min-width: 200px; }
            .heartbeat, .nazar-gentle { font-size: 3.5rem; }
            .surprise-message { font-size: 2rem; }
        }

        /* small corner decorations (non‑interactive) */
        .corner-heart {
            position: fixed;
            top: 16px;
            left: 16px;
            font-size: 1.6rem;
            opacity: 0.3;
            color: #f682a5;
            pointer-events: none;
            z-index: 1;
        }
        .corner-nazar {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 1.9rem;
            opacity: 0.3;
            color: #b594ff;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <!-- floating hearts container (visible only during animations) -->
    <div class="floating-hearts-container" id="heartContainer"></div>

    <!-- subtle background icons -->
    <div class="corner-heart">💞</div>
    <div class="corner-nazar">🧿</div>

    <!-- SURPRISE PAGE (visible initially) -->
    <div id="surprisePage" class="page">
        <div class="surprise-content">
            <div class="big-heart-surprise">💞🧿</div>
            <div class="surprise-message">
                <span>🌸</span> i have a surprise<br>for you, Moto <span>🌸</span>
            </div>
            <!-- clear button with proper ID -->
            <button class="btn-reveal" id="revealBtn">
                <span>💞</span> open your holi surprise <span>🧿</span>
            </button>
            <div class="small-note">
                just for you 💕
            </div>
        </div>
    </div>

    <!-- MAIN ROMANTIC PAGE (hidden initially) -->
    <div id="mainPage" class="page hidden-page">
        <div class="romance-header">
            <span class="heartbeat">💞</span>
            <span class="nazar-gentle">🧿</span>
        </div>

        <div class="moto-romantic">
            MOTO
        </div>

        <div class="love-message">
            <span>🌸</span> happy holi, my love <span>💫</span><br>
            every colour reminds me of you
        </div>

        <div class="romantic-verse">
            <i>💘</i> you're my favourite kind of colour <i>💘</i>
        </div>

        <div class="heart-drops">
            <div class="heart-item">
                <div class="heart-blob">💖</div>
                <span>your smile</span>
            </div>
            <div class="heart-item">
                <div class="heart-blob">💗</div>
                <span>your warmth</span>
            </div>
            <div class="heart-item">
                <div class="heart-blob">💞</div>
                <span>our bond</span>
            </div>
        </div>

        <button class="romance-btn" id="romanceBtn">
            <span>💞</span> send you my heart <span>🧿</span>
        </button>

        <div class="footer-love">
            💞 holi Moto … forever yours 🧿
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // Get references to the two pages and buttons
            const surprisePage = document.getElementById('surprisePage');
            const mainPage = document.getElementById('mainPage');
            const revealBtn = document.getElementById('revealBtn');
            const romanceBtn = document.getElementById('romanceBtn');
            const heartContainer = document.getElementById('heartContainer');

            // Safety check: if elements are missing, do nothing
            if (!surprisePage || !mainPage || !revealBtn || !romanceBtn) {
                console.warn('Required elements not found');
                return;
            }

            // Function to create floating hearts (purely cosmetic)
            function createFloatingHeart() {
                if (!heartContainer) return;
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                const symbols = ['💞', '🧿', '🌸', '💖', '💗', '💓', '💘', '💝', '🌺', '✨'];
                heart.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                const size = 1.8 + Math.random() * 1.7;
                heart.style.fontSize = size + 'rem';
                const duration = 3.5 + Math.random() * 4;
                heart.style.animation = `floatUp ${duration}s linear forwards`;
                heartContainer.appendChild(heart);
                setTimeout(() => {
                    if (heart.parentNode) heart.remove();
                }, duration * 1000 + 300);
            }

            // REVEAL BUTTON: switch pages and show main content
            revealBtn.addEventListener('click', function(e) {
                e.preventDefault();  // good practice for buttons inside forms (if any)

                // Hide surprise page, show main page
                surprisePage.classList.add('hidden-page');
                mainPage.classList.remove('hidden-page');

                // Launch a few floating hearts as celebration
                for (let i = 0; i < 12; i++) {
                    setTimeout(createFloatingHeart, i * 60);
                }

                // Optional tiny background flash (just for feedback)
                document.body.style.background = 'linear-gradient(145deg, #ffe3ef, #fff0f8)';
                setTimeout(() => {
                    document.body.style.background = '';
                }, 400);
            });

            // ROMANCE BUTTON: send hearts and show love alert
            romanceBtn.addEventListener('click', function(e) {
                e.preventDefault();

                for (let i = 0; i < 12; i++) {
                    setTimeout(createFloatingHeart, i * 60);
                }

                document.body.style.background = 'linear-gradient(145deg, #ffe3ef, #fff0f8)';
                setTimeout(() => {
                    document.body.style.background = '';
                }, 400);

                // Sweet message – appears after a tiny delay so hearts start first
                setTimeout(() => {
                    alert('💞 i love you, Moto! 🧿');
                }, 150);
            });

            // Bonus: a few floating hearts on page load to set the mood
            window.addEventListener('load', () => {
                for (let i = 0; i < 4; i++) {
                    setTimeout(createFloatingHeart, i * 200 + 300);
                }
            });

        })();
    </script>

    <!-- ensure hidden class is absolute -->
    <style>
        .hidden-page { display: none !important; }
    </style>
</body>
  </html>
